services:
  - type: web
    name: twiq-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PAPER_TRADING_ONLY
        value: true
      - key: BROKER
        value: dhan
      - key: DATABASE_URL
        sync: false
      - key: DHAN_CLIENT_ID
        sync: false
      - key: DHAN_ACCESS_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BACKTEST_BUCKET
        value: backtest-cache
      - key: API_KEY
        sync: false
      - key: TICK_INTERVAL_SECONDS
        value: "2.5"
