<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>twiQ ATM Trades</title>
    <link rel="stylesheet" href="trades.css?v=7" />
  </head>
  <body>
    <section class="paper-card" id="paperCard">
      <div class="paper-card__inner">
        <header class="card-top" id="cardTop">
          <div class="card-top__row">
            <h2 class="card-top__title">Live Trades</h2>
            <span class="card-top__date" id="topDate">—</span>
          </div>
          <div class="card-top__stat">
            <p class="card-top__label">Starting capital</p>
            <p class="card-top__value" id="startingCapital">—</p>
          </div>
        </header>

        <div class="card-divider" aria-hidden="true"></div>

        <div class="watchlist">
          <div class="watchlist__head">
            <span id="watchlistCount">ATM trades</span>
            <span class="watchlist__head-right">P&amp;L</span>
          </div>
          <ul class="watchlist__list" id="tradesLogBody" aria-live="polite">
            <li class="watchlist__empty">Loading…</li>
          </ul>
        </div>

        <footer class="card-sticky-footer">
          <p class="card-sticky-footer__text">
            Session trades aligned to twiQ dashboard insights.
          </p>
        </footer>
      </div>
    </section>

    <script src="config.embed.js"></script>
    <script src="../config.js"></script>
    <script src="../shared.js"></script>
    <script src="trades.js?v=7"></script>
  </body>
</html>
